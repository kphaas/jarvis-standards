# JARVIS local-model catalog — memory + speed inputs for the model-fit check.
#
# Consumed by: jarvis_standards.adapters.model_fit.pure_python.
#
# IMPORTANT (ADR-0021 T4): the live model PINS are NOT here — they live in the
# consuming repos (jarvis-alpha registry / brain/tasks/dispatch.py,
# jarvis-financial config/agents.yaml, forge codegen config). This catalog is
# the shared CAPABILITY/SIZING reference plus a sparse set of seed assignments
# so the check is runnable and self-testing. Cross-repo pin scanning is future
# wiring (out of scope this PR).
#
# Schema (per model_ref):
#   params_total_b   : float — total parameters in billions. Drives MEMORY.
#   params_active_b  : float — active params/token (= total for dense models).
#                              Drives THROUGHPUT only. For MoE, total > active.
#   quant            : str   — one of q4 q5 q6 q8 f16 (see BYTES_PER_PARAM).
#   ctx_max          : int   — max context window (tokens), informational/clamp.
#   kv_per_1k_ctx_gb : float — optional; KV-cache GB per 1k context tokens.
#                              Omitted → KV_PER_1K_DEFAULT_GB (ADR-0021 T1).
#   notes            : str   — provenance.
#   assigned_node    : str   — optional; production-pinned target node.
#   production       : bool  — optional; true → checked under CLI --enforce.

