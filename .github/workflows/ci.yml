# JARVIS GitHub-hosted guardrail workflow.
#
# Source of truth: jarvis-standards/scripts/_templates/workflows/ci.yml.
#
# Expensive trusted checks belong to Forge native CI on Sandbox and report as
# `forge/native-ci-shadow`. Keep GitHub-hosted Actions focused on cheap,
# branch-safe guardrails that need GitHub PR context or full git history.

name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history for the audit comparison against the baseline.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install detect-secrets
        run: pip install --quiet "detect-secrets==1.5.0"

      - name: Scan against baseline
        run: |
          if [ ! -f .secrets.baseline ]; then
            echo "::warning::No .secrets.baseline present; running scan in audit-only mode."
            detect-secrets scan > /tmp/scan.json || true
            python - <<'PY'
          import json
          with open('/tmp/scan.json') as f:
              report = json.load(f)
          findings = sum(len(v) for v in report.get('results', {}).items())
          print(f"detect-secrets reported {findings} potential findings (baseline missing).")
          PY
            exit 0
          fi

          detect-secrets scan --baseline .secrets.baseline
